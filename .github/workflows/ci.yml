name: macmount-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-gates:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install dependencies
        run: npm ci

      - name: Self test
        run: npm run test

      - name: Dependency security audit
        run: npm run security:audit

      - name: Commercial gate
        run: npm run commercial:gate

      - name: Build release artifacts (unsigned)
        run: npm run release:win:unsigned

      - name: Release audit (unsigned allowed for CI)
        run: npm run release:audit:unsigned

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macmount-dist
          path: dist/*
          retention-days: 14
